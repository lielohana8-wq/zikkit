<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZIKKIT — AI-Powered Field Service Management</title>
<meta name="description" content="ZIKKIT replaces your receptionist and management software with one AI-powered platform.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060a10;--bg2:#0c1018;--card:#111827;--card2:#151d2e;--accent:#00E5B0;--accent2:#00C49A;--accentGlow:rgba(0,229,176,0.15);--blue:#3B82F6;--purple:#8B5CF6;--orange:#F59E0B;--red:#EF4444;--text:#F0F4F8;--sub:#7A8BA0;--dim:#3A4A5C;--border:rgba(255,255,255,0.06);--glow:0 0 80px rgba(0,229,176,0.08)}
html{scroll-behavior:smooth;overflow-x:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh}
.syne{font-family:'Syne',sans-serif}
.mono{font-family:'Space Mono',monospace}
a{color:var(--accent);text-decoration:none}
::selection{background:var(--accent);color:#000}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(6,10,16,0.7);backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid var(--border);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(16px,4vw,48px)}
.logo{font-family:'Syne';font-weight:800;font-size:24px;letter-spacing:3px;background:linear-gradient(135deg,var(--accent),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-r{display:flex;gap:28px;align-items:center}
.nav-r a{color:var(--sub);font-size:14px;font-weight:600;letter-spacing:0.5px;transition:0.2s}
.nav-r a:hover{color:var(--text)}
.btn{padding:11px 28px;border-radius:10px;font-weight:700;font-size:14px;border:none;cursor:pointer;transition:all 0.25s;display:inline-flex;align-items:center;gap:8px;text-decoration:none}
.btn-primary{background:var(--accent);color:#000;box-shadow:0 4px 20px var(--accentGlow)}
.btn-primary:hover{background:#00ffcc;transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,229,176,0.25)}
.btn-outline{background:transparent;border:1.5px solid rgba(0,229,176,0.4);color:var(--accent)}
.btn-outline:hover{background:rgba(0,229,176,0.06);border-color:var(--accent)}
.btn-ghost{background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text)}

/* ── HERO ── */
.hero{min-height:90vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:90px 24px 40px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;width:900px;height:900px;background:radial-gradient(circle,rgba(0,229,176,0.07) 0%,rgba(59,130,246,0.04) 40%,transparent 70%);top:-200px;left:50%;transform:translateX(-50%);pointer-events:none;animation:pulse 8s ease-in-out infinite}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:200px;background:linear-gradient(to top,var(--bg),transparent);pointer-events:none}
@keyframes pulse{0%,100%{opacity:0.6;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.1)}}

.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 18px;border-radius:99px;background:rgba(0,229,176,0.06);border:1px solid rgba(0,229,176,0.15);font-size:12px;font-weight:600;color:var(--accent);margin-bottom:28px;letter-spacing:0.5px;animation:fadeDown 0.8s ease}
.hero-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:blink 2s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}

.hero h1{font-family:'Syne';font-size:clamp(38px,7vw,76px);font-weight:800;line-height:1.05;margin-bottom:24px;letter-spacing:-1.5px;animation:fadeUp 0.8s ease 0.1s both}
.hero h1 .gr{background:linear-gradient(135deg,var(--accent),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero .sub{font-size:clamp(16px,2.2vw,20px);color:var(--sub);max-width:600px;line-height:1.6;margin-bottom:16px;animation:fadeUp 0.8s ease 0.2s both}
.hero .savings-line{font-family:'Space Mono';font-size:clamp(18px,3vw,28px);color:var(--accent);font-weight:700;margin-bottom:36px;animation:fadeUp 0.8s ease 0.3s both;text-shadow:0 0 40px var(--accentGlow)}
.hero .buttons{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;animation:fadeUp 0.8s ease 0.4s both}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ── MARQUEE ── */
.marquee-wrap{overflow:hidden;padding:28px 0;border-top:1px solid rgba(0,229,176,0.15);border-bottom:1px solid rgba(0,229,176,0.15);background:linear-gradient(180deg,rgba(0,229,176,0.04),var(--bg2),rgba(59,130,246,0.04));position:relative}
.marquee-wrap::before,.marquee-wrap::after{content:'';position:absolute;top:0;bottom:0;width:120px;z-index:2;pointer-events:none}
.marquee-wrap::before{left:0;background:linear-gradient(to right,var(--bg),transparent)}
.marquee-wrap::after{right:0;background:linear-gradient(to left,var(--bg),transparent)}
.marquee{display:flex;gap:0;animation:scroll 25s linear infinite;width:max-content}
.marquee span{font-family:'Syne';font-size:18px;font-weight:700;white-space:nowrap;letter-spacing:2px;padding:0 20px;background:linear-gradient(90deg,var(--accent),var(--blue),var(--purple),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:300% 100%;animation:shimmer 4s linear infinite}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
.marquee em{font-style:normal}
.marquee b{font-weight:400;padding:0 14px;background:none;-webkit-text-fill-color:var(--accent);font-size:12px;opacity:0.5}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* ── SECTIONS ── */
.section{padding:clamp(40px,6vw,72px) clamp(16px,4vw,48px);max-width:1200px;margin:0 auto}
.stitle{font-family:'Syne';font-size:clamp(28px,5vw,48px);font-weight:800;letter-spacing:-1px;margin-bottom:16px}
.ssub{color:var(--sub);font-size:16px;line-height:1.5;max-width:560px;margin-bottom:24px}
.center{text-align:center;margin-left:auto;margin-right:auto}

/* ── SECRETARY BANNER ── */
.sec-banner{position:relative;border-radius:24px;padding:32px 28px;background:linear-gradient(135deg,rgba(239,68,68,0.06),rgba(245,158,11,0.04));border:1px solid rgba(239,68,68,0.12);overflow:hidden;margin-bottom:36px}
.sec-banner::before{content:'';position:absolute;top:-1px;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),var(--orange))}
.sec-banner .big{font-family:'Syne';font-size:clamp(40px,6vw,64px);font-weight:800;color:var(--red);line-height:1;margin-bottom:8px}
.sec-banner .eq{font-family:'Space Mono';font-size:clamp(16px,2vw,22px);color:var(--sub);margin-bottom:20px}
.sec-banner .detail{font-size:15px;color:var(--sub);line-height:1.7;max-width:600px}
.sec-banner .vs{position:absolute;right:40px;top:50%;transform:translateY(-50%);text-align:center}
.sec-banner .vs .zk{font-family:'Syne';font-size:clamp(28px,4vw,40px);font-weight:800;color:var(--accent)}
.sec-banner .vs .zklbl{font-size:13px;color:var(--sub)}
@media(max-width:768px){.sec-banner .vs{position:static;transform:none;margin-top:24px}}

/* ── PAIN GRID ── */
.pain-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:36px}
.pain-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;position:relative;overflow:hidden;transition:0.3s}
.pain-card:hover{border-color:rgba(239,68,68,0.3);transform:translateY(-2px)}
.pain-card::after{content:'';position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,var(--red),transparent)}
.pain-card .num{font-family:'Space Mono';font-size:28px;font-weight:700;color:var(--red);margin-bottom:4px}
.pain-card .lbl{font-size:13px;color:var(--sub);line-height:1.4}

/* ── FEATURES ── */
.feat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px}
.feat-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px;position:relative;overflow:hidden;transition:0.3s}
.feat-card:hover{border-color:rgba(0,229,176,0.2);transform:translateY(-3px);box-shadow:var(--glow)}
.feat-card .icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:16px}
.feat-card:nth-child(1) .icon{background:rgba(0,229,176,0.1)}
.feat-card:nth-child(2) .icon{background:rgba(59,130,246,0.1)}
.feat-card:nth-child(3) .icon{background:rgba(139,92,246,0.1)}
.feat-card:nth-child(4) .icon{background:rgba(245,158,11,0.1)}
.feat-card:nth-child(5) .icon{background:rgba(59,130,246,0.1)}
.feat-card:nth-child(6) .icon{background:rgba(139,92,246,0.1)}
.feat-card h3{font-family:'Syne';font-size:18px;font-weight:700;margin-bottom:8px}
.feat-card p{color:var(--sub);font-size:14px;line-height:1.6}
.feat-card .tag{display:inline-block;margin-top:12px;padding:4px 12px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:0.5px}
.feat-card:nth-child(1) .tag{background:rgba(0,229,176,0.08);color:var(--accent)}

/* ── COMPARISON ── */
.compare{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:28px 0}
@media(max-width:700px){.compare{grid-template-columns:1fr}}
.compare-card{border-radius:20px;padding:32px;border:1px solid var(--border)}
.compare-card.old{background:rgba(239,68,68,0.03);border-color:rgba(239,68,68,0.12)}
.compare-card.new{background:rgba(0,229,176,0.03);border-color:rgba(0,229,176,0.15)}
.compare-card h3{font-family:'Syne';font-size:20px;font-weight:700;margin-bottom:16px}
.compare-card.old h3{color:var(--red)}
.compare-card.new h3{color:var(--accent)}
.compare-card li{list-style:none;padding:8px 0;font-size:14px;color:var(--sub);border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.compare-card li .cost{font-family:'Space Mono';font-weight:700}
.compare-card.old li .cost{color:var(--red)}
.compare-card.new li .cost{color:var(--accent)}
.compare-card .total{margin-top:16px;padding-top:16px;border-top:2px solid var(--border);display:flex;justify-content:space-between;font-weight:700;font-size:16px}
.compare-card.old .total .cost{font-family:'Space Mono';color:var(--red);font-size:20px}
.compare-card.new .total .cost{font-family:'Space Mono';color:var(--accent);font-size:20px}

/* ── SAVINGS HERO ── */
.save-hero{text-align:center;padding:36px 24px;position:relative}
.save-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(0,229,176,0.06),transparent 70%);pointer-events:none}
.save-hero .big{font-family:'Syne';font-size:clamp(48px,8vw,80px);font-weight:800;background:linear-gradient(135deg,var(--accent),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.save-hero .lbl{font-size:16px;color:var(--sub);margin-top:8px}

/* ── PRICING ── */
.price-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;max-width:960px;margin:0 auto}
.price-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px;position:relative;transition:0.3s}
.price-card:hover{transform:translateY(-4px)}
.price-card.pop{border-color:var(--accent);box-shadow:0 0 60px var(--accentGlow)}
.price-card.pop::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--blue));border-radius:20px 20px 0 0}
.price-card .badge{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;padding:5px 18px;border-radius:99px;font-size:11px;font-weight:800;letter-spacing:1px}
.price-card .name{font-size:13px;color:var(--sub);font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px}
.price-card .amount{font-family:'Syne';font-size:44px;font-weight:800;margin-bottom:4px}
.price-card.pop .amount{color:var(--accent)}
.price-card .period{color:var(--dim);font-size:13px;margin-bottom:24px}
.price-card ul{list-style:none;margin-bottom:28px}
.price-card li{padding:7px 0;font-size:13px;color:var(--sub);display:flex;align-items:center;gap:8px}
.price-card li::before{content:'\2713';color:var(--accent);font-weight:700;font-size:14px}

/* ── HOW IT WORKS ── */
.steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;counter-reset:step}
.step{text-align:center;padding:24px;position:relative}
.step::before{counter-increment:step;content:counter(step);font-family:'Syne';font-size:48px;font-weight:800;color:rgba(0,229,176,0.12);display:block;margin-bottom:8px}
.step h4{font-family:'Syne';font-size:16px;font-weight:700;margin-bottom:6px}
.step p{font-size:13px;color:var(--sub);line-height:1.5}

/* ── CTA ── */
.final-cta{text-align:center;padding:clamp(40px,6vw,72px) 24px;position:relative}
.final-cta::before{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent,rgba(0,229,176,0.03));pointer-events:none}
.final-cta h2{font-family:'Syne';font-size:clamp(32px,5vw,52px);font-weight:800;margin-bottom:16px;letter-spacing:-1px}
.final-cta p{color:var(--sub);font-size:17px;margin-bottom:36px;max-width:500px;margin-left:auto;margin-right:auto}

/* ── FOOTER ── */
footer{text-align:center;padding:32px;color:var(--dim);font-size:12px;border-top:1px solid var(--border);display:flex;justify-content:center;gap:24px;flex-wrap:wrap}

/* ── RTL ── */
[dir="rtl"] .sec-banner .vs{right:auto;left:40px}
[dir="rtl"] .compare-card li{flex-direction:row-reverse}
[dir="rtl"] .compare-card .total{flex-direction:row-reverse}

@media(max-width:600px){
  .nav-r a:not(.btn):not([href="#pricing"]){display:none}
  .sec-banner{padding:32px 20px}
  .compare{gap:12px}
}
</style>
</head>

    (p.pop?'<div class="badge">POPULAR</div>':'')+
    '<div class="name">'+p.name+'</div><div class="amount">'+p.amount+'</div><div class="period">'+p.period+'</div><ul>'+
    p.features.map(f=>'<li>'+f+'</li>').join('')+'</ul><a class="btn '+(p.pop?'btn-primary':'btn-ghost')+'" href="https://app.zikkit.com/register">'+c.nCta+'</a></div>').join('');
  document.getElementById('cta-h').textContent=c.ctaH;
  document.getElementById('cta-p').textContent=c.ctaP;
  document.getElementById('cta-btn').textContent=c.ctaBtn;
  document.getElementById('f-switch').textContent=c.switchLbl;
}

const tz=Intl.DateTimeFormat().resolvedOptions().timeZone||'';
const isIL=tz.includes('Jerusalem')||tz.includes('Israel')||navigator.language.startsWith('he');
let current=isIL?'he':'en';
render(isIL?HE:IL,isIL?'rtl':'ltr');

function switchTo(lang){
  current=lang;
  render(lang==='he'?HE:IL,lang==='he'?'rtl':'ltr');
  document.getElementById('btn-en').style.background=lang==='en'?'rgba(0,229,176,0.15)':'transparent';
  document.getElementById('btn-en').style.color=lang==='en'?'#00E5B0':'#7A8BA0';
  document.getElementById('btn-he').style.background=lang==='he'?'rgba(0,229,176,0.15)':'transparent';
  document.getElementById('btn-he').style.color=lang==='he'?'#00E5B0':'#7A8BA0';
}
// Init buttons
setTimeout(()=>{switchTo(current);},100);

// Intersection observer for scroll animations
const obs=new IntersectionObserver((entries)=>{entries.forEach(e=>{if(e.isIntersecting){e.target.style.opacity='1';e.target.style.transform='translateY(0)'}})},{threshold:0.1});
document.querySelectorAll('.pain-card,.feat-card,.price-card,.step,.compare-card,.sec-banner,.save-hero').forEach(el=>{el.style.opacity='0';el.style.transform='translateY(20px)';el.style.transition='opacity 0.6s ease, transform 0.6s ease';obs.observe(el)});
</script>
</body>
</html>
